apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: obs-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: obs-lab
    spec:
      containers:
        - name: gateway
          image: obs-lab/gateway:dev
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: OTEL_SERVICE_NAME
              value: gateway
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: ORDER_URL
              value: http://order:8000
            - name: INVENTORY_URL
              value: http://inventory:8001
            # Pod のメタ情報をリソース属性として付与 (k8s らしい設定例)
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: k8s.pod.name=$(K8S_POD_NAME),deployment.environment=k8s
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: gateway
spec:
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: http
      port: 8000
      targetPort: http
