# ローカル (kind) 専用: Grafana LGTM オールインワンを同一クラスタに立てる
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  labels:
    app.kubernetes.io/name: lgtm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lgtm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lgtm
    spec:
      containers:
        - name: lgtm
          image: grafana/otel-lgtm:latest
          ports:
            - name: grafana
              containerPort: 3000
            - name: otlp-grpc
              containerPort: 4317
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { memory: 2Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm
  labels:
    app.kubernetes.io/name: lgtm
spec:
  selector:
    app.kubernetes.io/name: lgtm
  ports:
    - name: grafana
      port: 3000
      targetPort: grafana
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
