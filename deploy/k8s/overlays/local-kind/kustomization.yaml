apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: obs-lab

resources:
  - ../../base
  - lgtm.yaml

# base の Collector 設定を LGTM 向けに差し替える
configMapGenerator:
  - name: otel-collector-config
    behavior: replace
    files:
      - config.yaml=otel-collector-config.yaml

# kind に `kind load docker-image` で読み込んだローカルイメージを使う
images:
  - name: obs-lab/gateway
    newTag: dev
  - name: obs-lab/order
    newTag: dev
  - name: obs-lab/inventory
    newTag: dev
